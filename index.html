    <!-- Pantalla de carga (se muestra al instante y React la reemplaza al montar) -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        overflow: hidden;
        background: radial-gradient(circle at 30% 20%, #1e3a8a 0%, #0f172a 55%, #020617 100%);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        animation: splash-fade 0.4s ease;
      }
      @keyframes splash-fade { from { opacity: 0; } to { opacity: 1; } }

      /* Emojis flotando de fondo */
      #splash .sp-bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #splash .sp-bg span {
        position: absolute;
        font-size: 30px;
        opacity: 0.14;
        animation: sp-float 7s ease-in-out infinite;
      }
      #splash .sp-bg span:nth-child(1) { top: 12%; left: 14%; animation-delay: 0s;   }
      #splash .sp-bg span:nth-child(2) { top: 22%; left: 78%; animation-delay: 1.1s; font-size: 40px; }
      #splash .sp-bg span:nth-child(3) { top: 68%; left: 20%; animation-delay: 2.2s; font-size: 36px; }
      #splash .sp-bg span:nth-child(4) { top: 78%; left: 82%; animation-delay: 0.6s; }
      #splash .sp-bg span:nth-child(5) { top: 46%; left: 50%; animation-delay: 1.6s; font-size: 44px; }
      #splash .sp-bg span:nth-child(6) { top: 82%; left: 46%; animation-delay: 3s;   }
      @keyframes sp-float {
        0%, 100% { transform: translateY(0) rotate(-6deg); }
        50%      { transform: translateY(-22px) rotate(8deg); }
      }

      /* Control central */
      #splash .sp-icono {
        position: relative;
        font-size: 76px;
        line-height: 1;
        filter: drop-shadow(0 8px 22px rgba(29, 78, 216, 0.55));
        animation: sp-bounce 1.4s ease-in-out infinite;
      }
      @keyframes sp-bounce {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50%      { transform: translateY(-14px) rotate(4deg); }
      }

      /* Título con degradado */
      #splash .sp-titulo {
        margin: 0;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0.5px;
        text-align: center;
        background: linear-gradient(90deg, #60a5fa, #34d399, #fbbf24, #f472b6);
        background-size: 250% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: sp-shine 3s linear infinite;
      }
      @keyframes sp-shine { to { background-position: 250% center; } }

      #splash .sp-sub {
        margin: -14px 0 0;
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #94a3b8;
      }

      /* Puntos de carga */
      #splash .sp-dots {
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }
      #splash .sp-dots i {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        animation: sp-dot 1.2s ease-in-out infinite;
      }
      #splash .sp-dots i:nth-child(1) { background: #60a5fa; animation-delay: 0s;    }
      #splash .sp-dots i:nth-child(2) { background: #34d399; animation-delay: 0.15s; }
      #splash .sp-dots i:nth-child(3) { background: #fbbf24; animation-delay: 0.3s;  }
      #splash .sp-dots i:nth-child(4) { background: #f472b6; animation-delay: 0.45s; }
      @keyframes sp-dot {
        0%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%      { transform: scale(1);   opacity: 1;   }
      }

      @media (max-width: 480px) {
        #splash .sp-icono  { font-size: 60px; }
        #splash .sp-titulo { font-size: 24px; }
      }
    </style>
